{% extends "book/base.html" %}
{% block title %} Book form {% endblock %}
{% block content %} 

    <div class="container-fluid">
        <div class="container">
            {% if messages %}
                {% for msg in messages %}
                    <div class="mt-3 alert alert-success {{msg.tags}}">{{msg}}</div>
                {% endfor %}
            {% endif %}
            <form action="" method="post">
                {% csrf_token %}
                {{frm.as_p}}
                <button class="btn btn-primary" type="submit">SAVE</button>
            </form>
        </div>
    </div>

{% endblock %}
