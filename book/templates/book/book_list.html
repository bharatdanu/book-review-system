{% extends "book/base.html" %}
{% block title %} Book List {% endblock %}
{% block content %}

<div class="container-fluid">
    <div class="container">
        <div class="container mt-4">

            <!-- Genre Filter -->
            <div class="row mb-4">
                <div class="col">
                    <div class="btn-group">

                        <!-- All Button -->
                        <a href="{% url 'book-list' %}" class="btn btn-outline-primary {% if not request.GET.genre %}active{% endif %}">
                            All
                        </a>

                        <!-- Fiction -->
                        <a href="?genre=fiction" class="btn btn-outline-primary {% if request.GET.genre == 'fiction' %}active{% endif %}">
                            Fiction
                        </a>

                        <!-- Non-Fiction -->
                        <a href="?genre=non_fiction" class="btn btn-outline-primary {% if request.GET.genre == 'non_fiction' %}active{% endif %}">
                            Non-Fiction
                        </a>

                        <!-- Science -->
                        <a href="?genre=science" class="btn btn-outline-primary {% if request.GET.genre == 'science' %}active{% endif %}">
                            Science
                        </a>

                        <!-- Technology -->
                        <a href="?genre=technology" class="btn btn-outline-primary {% if request.GET.genre == 'technology' %}active{% endif %}">
                            Technology
                        </a>

                        <!-- History -->
                        <a href="?genre=history" class="btn btn-outline-primary {% if request.GET.genre == 'history' %}active{% endif %}">
                            History
                        </a>

                        <!-- Other -->
                        <a href="?genre=other" class="btn btn-outline-primary {% if request.GET.genre == 'other' %}active{% endif %}">
                            Other
                        </a>

                    </div>
                </div>
            </div>
        </div>
    </div>




    <div class="container-fluid">
        <div class="container ">
            <div class="row g-3">
                {% for bk in lst %}
                <div class="col-md-4 col-lg-3">
                    <div class="card p-2 h-100">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">{{bk.title}}</h5>
                            <h6 class="card-subtitle mb-2 text-body-secondary">by {{bk.author}}</h6>
                            <p class="card-text">{{bk.description}}</p>
                            <a href="{% url 'book-detail' bk.pk %}" class="btn btn-primary mt-auto">VIEW</a>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
    {% endblock %}
